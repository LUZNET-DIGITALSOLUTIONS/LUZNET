      * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: black;
  flex-wrap: wrap;
}

/* Tarjeta */
.card {
  position: relative;
  width: 300px;
  max-width: 90%;
  border-radius: 5px;
  overflow: hidden;
  transition: .5s;
  margin: 15px 20px;
  border: 1px solid transparent;
  border-image: linear-gradient(90deg, #ff00cc, #00ccff) 1;
  font-family: 'Shadows Into Light';
  
}

/* Fondo de nubes */
.card::before,
.card::after {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: url("https://i.ibb.co/k6zqJPLG/IMG-20260502-205013.jpg") no-repeat center center;
  background-size: cover;
}

.card::before {
  animation: mover1 5s infinite linear;
  z-index: -2;
}

.card::after {
  opacity: 0.5;
  animation: mover2 5s infinite linear;
  z-index: -1;
}

@keyframes mover1 {
  0%   { transform: scale(1) translate(0,0); }
  50%  { transform: scale(1.1) translate(-20px, -10px); }
  100% { transform: scale(1) translate(0,0); }
}

@keyframes mover2 {
  0%   { transform: scale(1) translate(0,0); }
  50%  { transform: scale(1.1) translate(20px, 15px); }
  100% { transform: scale(1) translate(0,0); }
}



/* Encabezado */
.card .head {
  height: 10px;
  width: 100%;
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.logo-container {
background:transparent;   /* 👈 elimina el fondo negro */
  border: none;              /* opcional: quita cualquier marco */
height: 150px;
  width: 150px;       /* tamaño del círculo */
       /* mismo valor para ancho y alto */
  border-radius: 50%; /* recorte circular */
  overflow: hidden;   /* oculta todo lo que sobresalga */
  margin: 10px auto 0px auto;
  position: relative;
}

.logo-container img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
  display: block;

  /* 👇 Animación de zoom */
  transform: scale(0.5);          /* inicia más pequeño */
  animation: zoomIn 3s ease-out forwards; /* se expande una sola vez */
}

@keyframes zoomIn {
  from {
    transform: scale(0.5); /* inicio pequeño */
    opacity: 0.5;          /* opcional: un poco transparente */
  }
  to {
    transform: scale(1);   /* tamaño normal */
    opacity: 1;            /* opaco */
  }
}

    .card .head .img img {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
    }


/* Texto */
.card .description {
  height: 180px;
 /* padding: 40px 20px 20px 20px;*/
  border-bottom:  solid 1px ;
  border-image: linear-gradient(90deg, #ff00cc, #00ccff) 1;
  text-align: center;
  position: relative;
  z-index: 1;
}

h2{
   font-size:32px; 
}

h4{
   font-size:20px; 
}




a{
   font-size:25px; 
}
.card .description h2,h4,p,i{
  animation: animate 10s infinite linear;
}


@keyframes animate {
  0%,100%{ color:aqua; }
  25%{ color: deeppink; }
  50%{ color:deepskyblue; }
  75%{ color: white; }
}

/* Redes sociales */
.card .contact {
  width: 100%;
  height: 75px;
  display: flex;
  align-items: center;
  justify-content: center;
  
  position: relative;
  z-index: 1;
}

.card .contact a {
  text-decoration: none;
  color: #fff;
  padding: 5px 10px;
  border-radius: 100%;
  transition: .5s;  
}

.card .contact a:hover {
  background: linear-gradient(to top,blue,black);
  box-shadow: 0 5px 5px rgba(0,0,0,1);
  transform: translateY(-10px);
}

/* Botón catálogo */

/*efecto matrix h2*/
   #matrix-text {
   /* font-size:3em;*/
    font-size:32px;
    
    white-space: pre;
  /*  font-family: 'Montserrat', sans-serif;*/
    letter-spacing: 4px;
    color: #00ff00; /* verde Matrix */
  }

  /* Animación Matrix para cada letra */
  #matrix-text span {
    opacity: 0;
    transform: translateY(-400px);
    display: inline-block;
    animation: caer 3s forwards;
  }

  @keyframes caer {
    0%   { opacity: 0; transform: translateY(-400px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  
  
  /*efecto olas de mar h4*/
    #wave-text {
   /* font-size:2em;*/
    font-size:20px;
 /*   font-family: 'Raleway', sans-serif;*/
    display: inline-block;
    color: #00ffff; /* aqua */
    white-space: pre; /* mantiene los espacios */
  }

  #wave-text span {
    display: inline-block;
    animation: wave 2s infinite ease-in-out;
  }

  @keyframes wave {
    0%   { transform: translateY(0); }
    25%  { transform: translateY(-8px); }
    50%  { transform: translateY(0); }
    75%  { transform: translateY(8px); }
    100% { transform: translateY(0); }
  }
  /*efecto zoom p */
   #zoom-text {
  font-size: 1.2rem;
  opacity: 0;
  transform: scale(0);
  animation: zoomIn 5s forwards ease-out, animate 10s infinite linear;
}

  @keyframes zoomIn {
    0%   { opacity: 0; transform: scale(0); }
    50%  { opacity: 0.7; transform: scale(1.2); } /* ligero sobre-zoom */
    100% { opacity: 1; transform: scale(1); }     /* tamaño final */
  }

/* Entrada desde la izquierda */
.izquierda {
  animation: entrarIzquierda 1s forwards ease-out;
}

@keyframes entrarIzquierda {
  0%   { transform: translateX(-100%); opacity: 0; }
  100% { transform: translateX(0); opacity: 1; }
}

/* Entrada desde la derecha */
.derecha {
  animation: entrarDerecha 1s forwards ease-out;
  animation-delay: 0.5s;
}

@keyframes entrarDerecha {
  0%   { transform: translateX(100%); opacity: 0; }
  100% { transform: translateX(0); opacity: 1; }
}

/* Fondo animado */
@keyframes bg-animation {
  0%   { background-position: left; }
  50%  { background-position: right; }
  100% { background-position: left; }
}

/* Zoom infinito aplicado al enlace */
@keyframes zoomPulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.05); }
  100% { transform: scale(1); }
}

  <script>


//efecto matrix h2
function prepararMatrixTexto() {
    const p = document.getElementById('matrix-text');
    if (!p) return;

    const texto = p.getAttribute('data-text');
    p.textContent = ''; // limpiar contenido

    // Crear spans para cada letra con retraso aleatorio
    for (let i = 0; i < texto.length; i++) {
      const span = document.createElement('span');
      span.textContent = texto[i];
      // Retraso aleatorio entre 0 y 1.5 segundos
      const delay = (Math.random() * 1.5).toFixed(2);
      span.style.animationDelay = `${delay}s`;
      p.appendChild(span);
    }
  }

  // Ejecutar al cargar
  prepararMatrixTexto();
  
  
  //efecto olas de mar
  function prepararWaveTexto() {
    const p = document.getElementById('wave-text');
    if (!p) return;

    const texto = p.textContent;
    p.textContent = ''; // limpiar contenido

    // Crear spans para cada letra (incluyendo espacios)
    for (let i = 0; i < texto.length; i++) {
      const span = document.createElement('span');
      span.textContent = texto[i] === " " ? "\u00A0" : texto[i]; // espacio visible
      span.style.animationDelay = `${i * 0.2}s`; // efecto de ola progresivo
      p.appendChild(span);
    }
  }

  prepararWaveTexto();
  </script>
